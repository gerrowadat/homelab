global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - "blackbox_alerting_rules.yml"
  - "node_exporter_recording_rules.yml"
  - "node_exporter_alerting_rules.yml"
  - "nomad_botherer_alerting_rules.yml"
  - "consul_alerting_rules.yml"
  - "grafana-sm-alerting-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
      - targets:
        - prom-alertmanager.service.home.consul:9093

scrape_configs:

  # Self-scrape.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Physical hosts -- node_exporter on port 9100.
  # 60s interval is sufficient resolution for host metrics.
  # Host list is anchored here and reused by blackbox-ping below.
  - job_name: node_exporter
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets: &physical_hosts
          - hedwig
          - rabbitseason
          - duckseason
          - donkeh
          - bebop
          - rocksteady
          - picluster5
          - tings
    relabel_configs:
      - source_labels: [__address__]
        regex: (.+)
        target_label: __address__
        replacement: $1:9100

  # Consul cluster metrics.
  - job_name: consul
    scrape_interval: 1m
    scrape_timeout: 1m
    static_configs:
      - targets: ['prom-consul-exporter.service.home.consul:9107']

  # UPS stats via nut2mqtt.
  - job_name: nut2mqtt
    scrape_interval: 5s
    static_configs:
      - targets: ['nut2mqtt.service.home.consul:3494']

  # Blackbox exporter self-scrape.
  - job_name: blackbox
    static_configs:
      - targets: ['prom-blackbox-exporter.service.home.consul:9115']

  # HTTP availability probes for external URLs.
  - job_name: blackbox-http-base
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - home.andvari.net/rss/
          - www.sica.ie
          - www.strategichopes.co
          - www.andvari.net
          - log.andvari.net
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prom-blackbox-exporter.service.home.consul:9115

  # HTTP availability probes for internal consul services (plain HTTP).
  - job_name: blackbox-consul-http
    metrics_path: /probe
    params:
      module: [http_2xx_internal]
    static_configs:
      - targets:
          - prometheus.service.home.consul:9090
          - prom-alertmanager.service.home.consul:9093
          - prom-blackbox-exporter.service.home.consul:9115
          - prom-consul-exporter.service.home.consul:9107

          - nut2mqtt.service.home.consul:3494
          - http://miniflux.service.home.consul:8080/rss
          - z2m.service.home.consul:8081
          - nomad-botherer.service.home.consul:9112
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prom-blackbox-exporter.service.home.consul:9115

  # TCP availability probes for non-HTTP consul services.
  - job_name: blackbox-consul-tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - mosquitto.service.home.consul:1883
          - mysql.service.home.consul:3306
          - postgres.service.home.consul:5432
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prom-blackbox-exporter.service.home.consul:9115

  # nomad-botherer job drift detector.
  - job_name: nomad-botherer
    static_configs:
      - targets: ['nomad-botherer.service.home.consul:9112']

  # Newt tunnel client metrics (built-in Prometheus endpoint).
  - job_name: newt
    static_configs:
      - targets: ['newt.service.home.consul:2112']

  # ICMP ping probes for physical hosts.
  # 1m interval: more frequent than this causes alert flapping on transient packet loss.
  # Reuses the host list anchored in node_exporter above.
  - job_name: blackbox-ping
    metrics_path: /probe
    params:
      module: [icmp]
    scrape_interval: 1m
    static_configs:
      - targets: *physical_hosts
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prom-blackbox-exporter.service.home.consul:9115
