- name: nomad/consul nodes
  hosts: nomadconsul
  any_errors_fatal: true
  become: true
  become_user: root
  roles:
    - remove_k8s
    - nfs_client
    - nomad
    - consul

- name: nfs servers
  hosts: nfs_server
  become: true
  become_user: root
  roles:
    - role: ansible-nfs-server

- name: dns servers
  hosts: dns_server
  become: true
  become_user: root
  roles:
    - role: dns_server

- name: login servers
  hosts: login
  become: true
  become_user: root
  roles:
    - role: login

- name: UPS machines
  hosts: ups
  become: true
  become_user: root
  roles:
    - role: ups
