# --- Hashicorp apt repo setup ---

- name: Add Hashicorp apt signing key
  ansible.builtin.apt_key:
    url: https://apt.releases.hashicorp.com/gpg
    state: present

- name: Add Hashicorp apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ download_arch }}] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    state: present
    filename: hashicorp
    update_cache: yes

- name: Install consul at pinned version
  ansible.builtin.apt:
    name: "consul={{ consul_version }}-1"
    state: present

- name: Hold consul package at current version
  ansible.builtin.dpkg_selections:
    name: consul
    selection: hold

# --- One-time migration: clean up artifacts from the old binary-download install ---
# These tasks are idempotent -- safe to re-run once the files are already gone.

- name: Check for old consul binary
  ansible.builtin.stat:
    path: /usr/local/bin/consul
  register: old_consul_binary

- name: Stop consul before migration cleanup
  ansible.builtin.systemd:
    name: consul
    state: stopped
  when: old_consul_binary.stat.exists
  failed_when: false

- name: Remove old consul binary
  ansible.builtin.file:
    path: /usr/local/bin/consul
    state: absent

- name: Remove old custom consul systemd unit
  ansible.builtin.file:
    path: /etc/systemd/system/consul.service
    state: absent
  notify: Reload systemd daemon

- name: Flush handlers (ensure daemon-reload runs before service management)
  ansible.builtin.meta: flush_handlers

# --- Config and data directories (unchanged from before) ---

- name: Create consul user
  ansible.builtin.user:
    name: consul
    create_home: no
    home: /etc/consul.d
    shell: /bin/false

- name: Create /opt/consul
  ansible.builtin.file:
    path: '/opt/consul'
    state: directory
    owner: consul
    group: consul

- name: Create /etc/consul.d
  ansible.builtin.file:
    path: '/etc/consul.d'
    mode: '700'
    state: directory
    owner: consul
    group: consul

- name: Generate consul.hcl
  ansible.builtin.template:
    src: consul.hcl.j2
    dest: '/etc/consul.d/consul.hcl'
    owner: consul
    group: consul
  notify: Restart consul

- name: Generate server.hcl
  ansible.builtin.template:
    src: server.hcl.j2
    dest: '/etc/consul.d/server.hcl'
    owner: consul
    group: consul
  notify: Restart consul

- name: Enable consul on boot
  ansible.builtin.systemd:
    name: consul
    enabled: yes
    state: started
  when: consul_enabled
