# --- Hashicorp apt repo setup ---
# The repo is also set up by the consul role; apt_key/apt_repository are
# idempotent so running this twice in the same play is harmless.

- name: Add Hashicorp apt signing key
  ansible.builtin.apt_key:
    url: https://apt.releases.hashicorp.com/gpg
    state: present

- name: Add Hashicorp apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ download_arch }}] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    state: present
    filename: hashicorp
    update_cache: yes

- name: Install nomad at pinned version
  ansible.builtin.apt:
    name: "nomad={{ nomad_version }}-1"
    state: present

- name: Hold nomad package at current version
  ansible.builtin.dpkg_selections:
    name: nomad
    selection: hold

# --- One-time migration: clean up artifacts from the old binary-download install ---
# These tasks are idempotent -- safe to re-run once the files are already gone.

- name: Check for old nomad binary
  ansible.builtin.stat:
    path: /usr/local/bin/nomad
  register: old_nomad_binary

- name: Stop nomad before migration cleanup
  ansible.builtin.systemd:
    name: nomad
    state: stopped
  when: old_nomad_binary.stat.exists
  failed_when: false

- name: Remove old nomad binary
  ansible.builtin.file:
    path: /usr/local/bin/nomad
    state: absent

- name: Remove old custom nomad systemd unit
  ansible.builtin.file:
    path: /etc/systemd/system/nomad.service
    state: absent
  notify: Reload systemd daemon

- name: Flush handlers (ensure daemon-reload runs before service management)
  ansible.builtin.meta: flush_handlers

# --- Config and data directories (unchanged from before) ---

- name: Create /opt/nomad
  ansible.builtin.file:
    path: '/opt/nomad'
    state: directory

- name: Create /local
  ansible.builtin.file:
    path: '/local'
    state: directory

- name: Create /etc/nomad.d
  ansible.builtin.file:
    path: '/etc/nomad.d'
    mode: '700'
    state: directory

- name: Copy nomad.hcl
  ansible.builtin.copy:
    src: nomad.hcl
    dest: '/etc/nomad.d/'
  notify: Restart nomad

- name: Copy server.hcl
  ansible.builtin.copy:
    src: server.hcl
    dest: '/etc/nomad.d/'
  when: nomad_server
  notify: Restart nomad

- name: Copy client.hcl
  ansible.builtin.copy:
    src: client.hcl
    dest: '/etc/nomad.d/'
  notify: Restart nomad

- name: Enable nomad on boot
  ansible.builtin.systemd:
    name: nomad
    enabled: yes
    state: started
