nfs_server:
        hosts:
                duckseason:
                        nfs_server_exports:
                                - export:
                                  access:
                                          - hostname: '192.168.100.240/28'
                                            options:
                                                - 'rw'
                                                - 'sync'
                                                - 'no_subtree_check'
                                          - hostname: 'localhost'
                                            options:
                                                - 'rw'
                                                - 'sync'
                                                - 'no_subtree_check'
                                  path: /export/things
                rabbitseason:
                        ansible_user: doc
                        nfs_server_exports:
                                - export:
                                  access:
                                          - hostname: '192.168.100.240/28'
                                            options:
                                                - 'rw'
                                                - 'sync'
                                                - 'no_subtree_check'
                                          - hostname: 'localhost'
                                            options:
                                                - 'rw'
                                                - 'sync'
                                                - 'no_subtree_check'
                                  path: /localssd/srv
                                - export:
                                  access:
                                          - hostname: '192.168.100.240/28'
                                            options:
                                                - 'rw'
                                                - 'sync'
                                                - 'no_subtree_check'
                                          - hostname: 'localhost'
                                            options:
                                                - 'rw'
                                                - 'sync'
                                                - 'no_subtree_check'
                                  path: /localdisk/mix

login:
        hosts:
                rabbitseason:
                        ansible_user: doc

nomadconsul:
        hosts:
                picluster2:
                picluster4:
                picluster5:
                        nomad_server: false
                duckseason:
                        download_arch: amd64
                        ansible_user: doc
                        nfs_primary: localhost
                hedwig:
                        download_arch: amd64
                        ansible_user: doc
                donkeh:
                        download_arch: amd64
                        ansible_user: doc
                bebop:
                        download_arch: amd64
                        ansible_user: doc
                rocksteady:
                        download_arch: amd64
                        ansible_user: doc
        vars:
                download_arch: arm64
                ansible_user: pi
                consul_gossip_key: "{{ lookup('env', 'CONSUL_GOSSIP_KEY') }}"
                existing_consul_server: 192.168.100.250 # hedwig
                nomad_server: true
                consul_enabled: true
                # nfs_primary and nfs_share define where /things is (it's at nfs_primary:nfs_share)
                # If you update this, remember to set nfs_primary to localhost for that host only, above.
                nfs_primary: duckseason
                nfs_share: "/export/things"
                # DNS servers that forward .consul queries to the local consul agent.
                # These are the nomad server nodes running bind9 with consul forwarding.
                docker_dns_servers:
                  - "192.168.100.249"
                  - "192.168.100.250"
                  - "192.168.100.253"

# Machines with a localy connected UPS.
ups:
        hosts:
                hedwig:
                        ups_name: eaton5s
                duckseason:
                        ups_name: eaton5p
        vars:
                ups_vendor_id: '0463'
                ups_pollfreq: 30


# DNS servers that can redsolve consul addresses.
dns_server:
        hosts:
                hedwig:
                donkeh:
                duckseason:

